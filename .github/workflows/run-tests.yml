# ============================================================
# GitHub Actions CI/CD 配置文件
# 触发条件：每次 push 代码到 main 分支 或 创建 Pull Request
# 执行内容：安装依赖 → 运行接口测试 → 生成 Allure 报告 → 飞书通知
# ============================================================

name: 接口自动化测试

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ===== 1. 拉取代码 =====
      - name: 拉取代码
        uses: actions/checkout@v4

      # ===== 2. 设置 Python 环境 =====
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ===== 3. 安装依赖 =====
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ===== 4. 运行测试（生成 Allure 原始数据） =====
      - name: 执行接口测试
        run: |
          pytest testcases/ -v --alluredir=./reports/allure_results
        continue-on-error: true

      # ===== 5. 复制 Allure 配置文件 =====
      - name: 复制 Allure 配置文件
        run: |
          mkdir -p ./reports/allure_results
          if [ -f categories.json ]; then cp categories.json ./reports/allure_results/; fi
          if [ -f executor.json ]; then cp executor.json ./reports/allure_results/; fi

      # ===== 6. 安装 Allure 命令行工具 =====
      - name: 安装 Allure 命令行
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.zip -o allure.zip
          unzip allure.zip -d /opt/
          echo "/opt/allure-2.29.0/bin" >> $GITHUB_PATH

      # ===== 7. 生成 Allure HTML 报告 =====
      - name: 生成 Allure 报告
        run: |
          allure generate ./reports/allure_results -o ./reports/allure_html --clean

      # ===== 8. 上传测试报告 =====
      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: ./reports/allure_html
          retention-days: 7

      # ===== 9. 上传 Allure 原始数据 =====
      - name: 上传 Allure 原始数据
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ./reports/allure_results
          retention-days: 3

      # ===== 10. 飞书测试报告通知 =====
      - name: 飞书测试报告通知
        if: always()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="✅ 全部通过"
            COLOR="green"
          else
            STATUS="❌ 存在失败"
            COLOR="red"
          fi

          # 构造飞书消息
          MESSAGE=$(cat <<EOF
          {
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": {
                  "tag": "plain_text",
                  "content": "🧪 接口自动化测试报告"
                },
                "template": "${COLOR}"
              },
              "elements": [
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "**状态：${STATUS}**"
                  }
                },
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "⏱️ 构建编号：${{ github.run_number }}"
                  }
                },
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "📎 [查看详细报告](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
                  }
                },
                {
                  "tag": "hr"
                },
                {
                  "tag": "note",
                  "elements": [
                    {
                      "tag": "plain_text",
                      "content": "🤖 由 GitHub Actions 自动发送"
                    }
                  ]
                }
              ]
            }
          }
          EOF
          )

          curl -X POST -H "Content-Type: application/json" -d "$MESSAGE" $FEISHU_WEBHOOK