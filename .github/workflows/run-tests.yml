# ============================================================
# GitHub Actions CI/CD 配置文件
# 触发条件：每次 push 代码到 main 分支 或 创建 Pull Request
# 执行内容：安装依赖 → 运行接口测试 → 生成 Allure 报告
# ============================================================

name: 接口自动化测试

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # 手动触发（可选）
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ===== 1. 拉取代码 =====
      - name: 拉取代码
        uses: actions/checkout@v4

      # ===== 2. 设置 Python 环境 =====
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ===== 3. 安装依赖 =====
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ===== 4. 运行测试（生成 Allure 原始数据） =====
      - name: 执行接口测试
        run: |
          pytest testcases/ -v --alluredir=./reports/allure_results

      # ===== 5. 安装 Allure 命令行工具 =====
      - name: 安装 Allure 命令行
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.zip -o allure.zip
          unzip allure.zip -d /opt/
          echo "/opt/allure-2.29.0/bin" >> $GITHUB_PATH

      # ===== 6. 生成 Allure HTML 报告 =====
      - name: 生成 Allure 报告
        run: |
          allure generate ./reports/allure_results -o ./reports/allure_html --clean

      # ===== 7. 上传报告作为构建产物 =====
      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: ./reports/allure_html
          retention-days: 7

      # ===== 8. 可选：上传 Allure 原始数据（供调试） =====
      - name: 上传 Allure 原始数据
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ./reports/allure_results
          retention-days: 3