<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>UI 自动化演示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 400px;
            text-align: center;
        }
        h2 {
            margin-bottom: 8px;
            color: #333;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        button:hover {
            transform: scale(1.02);
        }
        #message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            font-weight: 600;
        }
        #message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        #message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 UI 自动化演示</h2>
        <p class="subtitle">本地快速测试页面 · 毫秒级响应</p>

        <div class="form-group">
            <label>👤 用户名</label>
            <input id="username" placeholder="请输入用户名" value="Admin">
        </div>
        <div class="form-group">
            <label>🔒 密码</label>
            <input id="password" type="password" placeholder="请输入密码" value="admin123">
        </div>

        <button onclick="handleLogin()">🔐 登录</button>

        <div id="message"></div>
        <div class="info">⏱️ 本地页面 · 无需网络 · 速度极快</div>
    </div>

    <script>
        function handleLogin() {
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            var msg = document.getElementById('message');

            if (username === '' || password === '') {
                msg.className = 'error';
                msg.textContent = '❌ 用户名和密码不能为空！';
                return;
            }

            if (username === 'Admin' && password === 'admin123') {
                msg.className = 'success';
                msg.textContent = '✅ 登录成功！欢迎回来，' + username + '！';
            } else {
                msg.className = 'error';
                msg.textContent = '❌ 登录失败，请检查用户名或密码。';
            }
        }
    </script>
</body>
</html>
