[pytest]
# 测试目录（同时包含 API 和 UI）
testpaths = api_tests ui_tests

# 默认参数
addopts =
    -v
    --strict-markers
    --alluredir=./reports/allure_results
    --clean-alluredir
    --reruns=1
    --reruns-delay=2

# 自定义标记
markers =
    smoke: 冒烟测试（核心功能快速验证）
    regression: 全量回归测试
    api: 接口测试
    ui: UI 测试